        in: query
        description: 'Ledger version to get state of account


          If not provided, it will be the latest version'
        required: false
        deprecated: false
        explode: true
      - name: start
        schema:
          $ref: '#/components/schemas/StateKeyWrapper'
        in: query
        description: 'Cursor specifying where to start for pagination


          This cursor cannot be derived manually client-side. Instead, you must

          call this endpoint once without this query parameter specified, and

          then use the cursor returned in the X-Aptos-Cursor header in the

          response.'
        required: false
        deprecated: false
        explode: true
      - name: limit
        schema:
          type: integer
          format: uint16
        in: query
        description: 'Max number of account resources to retrieve


          If not provided, defaults to default page size.'
        required: false
        deprecated: false
        explode: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MoveResource'
            application/x-bcs:
