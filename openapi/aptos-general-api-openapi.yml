components:
  schemas:
    U64:
      type: string
      format: uint64
      description: 'A string containing a 64-bit unsigned integer.


        We represent u64 values as a string to ensure compatibility with languages such

        as JavaScript that do not parse u64s in JSON natively.

        '
      example: '32425224034'
    AptosErrorCode:
      type: string
      description: 'These codes provide more granular error information beyond just the HTTP

        status code of the response.'
      enum:
      - account_not_found
      - resource_not_found
      - module_not_found
      - struct_field_not_found
      - version_not_found
      - transaction_not_found
      - table_item_not_found
      - block_not_found
      - state_value_not_found
      - version_pruned
      - block_pruned
      - invalid_input
      - invalid_transaction_update
      - sequence_number_too_old
      - vm_error
      - rejected_by_filter
      - health_check_failed
      - mempool_is_full
      - rate_limited
      - internal_error
      - web_framework_error
      - bcs_not_supported
      - api_disabled
    AptosError:
      type: object
      description: 'This is the generic struct we use for all API errors, it contains a string

        message and an Aptos API specific error code.'
      required:
      - message
      - error_code
      properties:
        message:
          type: string
          description: A message describing the error
        error_code:
          $ref: '#/components/schemas/AptosErrorCode'
        vm_error_code:
          type: integer
          format: uint64
          description: A code providing VM error details when submitting transactions to the VM
    RoleType:
      type: string
      enum:
      - validator
      - full_node
    HealthCheckSuccess:
      type: object
      description: Representation of a successful healthcheck
      required:
      - message
      properties:
        message:
          type: string
    IndexResponse:
      type: object
      description: 'The struct holding all data returned to the client by the

        index endpoint (i.e., GET "/").  Only for responding in JSON'
      required:
      - chain_id
      - epoch
      - ledger_version
      - oldest_ledger_version
      - ledger_timestamp
      - node_role
      - oldest_block_height
      - block_height
      properties:
        chain_id:
          type: integer
          format: uint8
          description: Chain ID of the current chain
        epoch:
          $ref: '#/components/schemas/U64'
        ledger_version:
          $ref: '#/components/schemas/U64'
        oldest_ledger_version:
          $ref: '#/components/schemas/U64'
        ledger_timestamp:
          $ref: '#/components/schemas/U64'
        node_role:
          $ref: '#/components/schemas/RoleType'
        oldest_block_height:
          $ref: '#/components/schemas/U64'
        block_height:
          $ref: '#/components/schemas/U64'
        git_hash:
          type: string
          description: 'Git hash of the build of the API endpoint.  Can be used to determine the exact

            software version used by the API endpoint.'
        encryption_key:
          type: string
          description: Per-epoch transaction encryption key (hex-encoded)
externalDocs:
