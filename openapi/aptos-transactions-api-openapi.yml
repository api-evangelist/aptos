components:
  schemas:
    WriteSetChange_DeleteTableItem:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - delete_table_item
            example: delete_table_item
      - $ref: '#/components/schemas/DeleteTableItem'
    NoAccountSignature:
      type: object
      description: A placeholder to represent the absence of account signature
    Signature:
      type: object
      oneOf:
      - $ref: '#/components/schemas/Signature_Ed25519'
      - $ref: '#/components/schemas/Signature_Secp256k1Ecdsa'
      - $ref: '#/components/schemas/Signature_WebAuthn'
      - $ref: '#/components/schemas/Signature_Keyless'
      - $ref: '#/components/schemas/Signature_SlhDsa_Sha2_128s'
      discriminator:
        propertyName: type
        mapping:
          ed25519: '#/components/schemas/Signature_Ed25519'
          secp256k1_ecdsa: '#/components/schemas/Signature_Secp256k1Ecdsa'
          web_authn: '#/components/schemas/Signature_WebAuthn'
          keyless: '#/components/schemas/Signature_Keyless'
          slh_dsa__sha2_128s: '#/components/schemas/Signature_SlhDsa_Sha2_128s'
    EncryptedTransactionInnerPayload_ScriptPayload:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - script_payload
            example: script_payload
      - $ref: '#/components/schemas/ScriptPayload'
    WriteSet_ScriptWriteSet:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - script_write_set
            example: script_write_set
      - $ref: '#/components/schemas/ScriptWriteSet'
    Transaction_UserTransaction:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - user_transaction
            example: user_transaction
      - $ref: '#/components/schemas/UserTransaction'
    EntryFunctionId:
      type: string
      description: 'Entry function id is string representation of a entry function defined on-chain.


        Format: `{address}::{module name}::{function name}`


        Both `module name` and `function name` are case-sensitive.

        '
      example: 0x1::aptos_coin::transfer
    GasEstimation:
      type: object
      description: Struct holding the outputs of the estimate gas API
      required:
      - gas_estimate
      properties:
        deprioritized_gas_estimate:
          type: integer
          format: uint64
          description: The deprioritized estimate for the gas unit price
        gas_estimate:
          type: integer
          format: uint64
          description: The current estimate for the gas unit price
        prioritized_gas_estimate:
          type: integer
          format: uint64
          description: The prioritized estimate for the gas unit price
    Transaction_GenesisTransaction:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - genesis_transaction
            example: genesis_transaction
      - $ref: '#/components/schemas/GenesisTransaction'
    WriteSet_DirectWriteSet:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - direct_write_set
            example: direct_write_set
      - $ref: '#/components/schemas/DirectWriteSet'
    MoveFunction:
      type: object
      description: Move function
      required:
      - name
      - visibility
      - is_entry
      - is_view
      - generic_type_params
      - params
      - return
      properties:
        name:
          $ref: '#/components/schemas/IdentifierWrapper'
        visibility:
          $ref: '#/components/schemas/MoveFunctionVisibility'
        is_entry:
          type: boolean
          description: Whether the function can be called as an entry function directly in a transaction
        is_view:
          type: boolean
          description: Whether the function is a view function or not
        generic_type_params:
          type: array
          description: Generic type params associated with the Move function
          items:
            $ref: '#/components/schemas/MoveFunctionGenericTypeParam'
        params:
          type: array
          description: Parameters associated with the move function
          items:
            $ref: '#/components/schemas/MoveType'
        return:
          type: array
          description: Return type of the function
          items:
            $ref: '#/components/schemas/MoveType'
    RequestedMultipliers:
      type: object
      description: 'Multipliers for higher transaction limits, expressed as percent of the base

        limit (100 = 1x, 200 = 2x, 250 = 2.5x).'
      required:
      - execution_multiplier_percent
      - io_multiplier_percent
      properties:
        execution_multiplier_percent:
          $ref: '#/components/schemas/U64'
        io_multiplier_percent:
          $ref: '#/components/schemas/U64'
    HexEncodedBytes:
      type: string
      format: hex
      description: 'All bytes (Vec<u8>) data is represented as hex-encoded string prefixed with `0x` and fulfilled with

        two hex digits per byte.


        Unlike the `Address` type, HexEncodedBytes will not trim any zeros.

        '
      example: 61959483996478237799081788855878961092127547100767458402256961684167818091681
    ValidatorTransaction:
      type: object
      oneOf:
      - $ref: '#/components/schemas/ValidatorTransaction_JWKUpdateTransaction'
      - $ref: '#/components/schemas/ValidatorTransaction_DKGResultTransaction'
      - $ref: '#/components/schemas/ValidatorTransaction_ChunkyDKGResultTransaction'
      discriminator:
        propertyName: validator_transaction_type
        mapping:
          observed_jwk_update: '#/components/schemas/ValidatorTransaction_JWKUpdateTransaction'
          dkg_result: '#/components/schemas/ValidatorTransaction_DKGResultTransaction'
          chunky_d_k_g_result: '#/components/schemas/ValidatorTransaction_ChunkyDKGResultTransaction'
    PublicKey_Secp256r1Ecdsa:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - secp256r1_ecdsa
            example: secp256r1_ecdsa
      - $ref: '#/components/schemas/Secp256r1Ecdsa'
    FeePayerSignature:
      type: object
      description: 'Fee payer signature for fee payer transactions


        This allows you to have transactions across multiple accounts and with a fee payer'
      required:
      - sender
      - secondary_signer_addresses
      - secondary_signers
      - fee_payer_address
      - fee_payer_signer
      properties:
        sender:
          $ref: '#/components/schemas/AccountSignature'
        secondary_signer_addresses:
          type: array
          description: The other involved parties' addresses
          items:
            $ref: '#/components/schemas/Address'
        secondary_signers:
          type: array
          description: The associated signatures, in the same order as the secondary addresses
          items:
            $ref: '#/components/schemas/AccountSignature'
        fee_payer_address:
          allOf:
          - $ref: '#/components/schemas/Address'
          - description: The address of the paying party
        fee_payer_signer:
          allOf:
          - $ref: '#/components/schemas/AccountSignature'
          - description: The signature of the fee payer
    UserTxnLimitsRequest_StakePoolOwnerLimitsRequest:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - stake_pool_owner
            example: stake_pool_owner
      - $ref: '#/components/schemas/StakePoolOwnerLimitsRequest'
    TransactionPayload:
      type: object
      description: An enum of the possible transaction payloads
      oneOf:
      - $ref: '#/components/schemas/TransactionPayload_EntryFunctionPayload'
      - $ref: '#/components/schemas/TransactionPayload_ScriptPayload'
      - $ref: '#/components/schemas/TransactionPayload_DeprecatedModuleBundlePayload'
      - $ref: '#/components/schemas/TransactionPayload_MultisigPayload'
      - $ref: '#/components/schemas/TransactionPayload_EncryptedTransactionPayload'
      discriminator:
        propertyName: type
        mapping:
          entry_function_payload: '#/components/schemas/TransactionPayload_EntryFunctionPayload'
          script_payload: '#/components/schemas/TransactionPayload_ScriptPayload'
          module_bundle_payload: '#/components/schemas/TransactionPayload_DeprecatedModuleBundlePayload'
          multisig_payload: '#/components/schemas/TransactionPayload_MultisigPayload'
          encrypted_transaction_payload: '#/components/schemas/TransactionPayload_EncryptedTransactionPayload'
    MoveResource:
      type: object
      description: A parsed Move resource
      required:
      - type
      - data
      properties:
        type:
          $ref: '#/components/schemas/MoveStructTag'
        data:
          $ref: '#/components/schemas/MoveStructValue'
    PublicKey_Ed25519:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - ed25519
            example: ed25519
      - $ref: '#/components/schemas/Ed25519'
    DKGResultTransaction:
      type: object
      required:
      - version
      - hash
      - state_change_hash
      - event_root_hash
      - gas_used
      - success
      - vm_status
      - accumulator_root_hash
      - changes
      - events
      - timestamp
      - dkg_transcript
      properties:
        version:
          $ref: '#/components/schemas/U64'
        hash:
          $ref: '#/components/schemas/HashValue'
        state_change_hash:
          $ref: '#/components/schemas/HashValue'
        event_root_hash:
          $ref: '#/components/schemas/HashValue'
        state_checkpoint_hash:
          $ref: '#/components/schemas/HashValue'
        gas_used:
          $ref: '#/components/schemas/U64'
        success:
          type: boolean
          description: Whether the transaction was successful
        vm_status:
          type: string
          description: The VM status of the transaction, can tell useful information in a failure
        accumulator_root_hash:
          $ref: '#/components/schemas/HashValue'
        changes:
          type: array
          description: Final state of resources changed by the transaction
          items:
            $ref: '#/components/schemas/WriteSetChange'
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        timestamp:
          $ref: '#/components/schemas/U64'
        dkg_transcript:
          $ref: '#/components/schemas/ExportedDKGTranscript'
    Secp256k1Ecdsa:
      type: object
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/HexEncodedBytes'
    AccountSignature_SingleKeySignature:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - single_key_signature
            example: single_key_signature
      - $ref: '#/components/schemas/SingleKeySignature'
    BlockMetadataExtensionRandomnessAndDecKey:
      type: object
      properties:
        randomness:
          $ref: '#/components/schemas/HexEncodedBytes'
        decryption_key:
          $ref: '#/components/schemas/HexEncodedBytes'
    WebAuthn:
      type: object
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/HexEncodedBytes'
    WriteSetChange_WriteModule:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - write_module
            example: write_module
      - $ref: '#/components/schemas/WriteModule'
    MultisigTransactionPayload:
      type: object
      description: Enum for multisig transaction payloads, supporting both entry functions and scripts.
      oneOf:
      - $ref: '#/components/schemas/MultisigTransactionPayload_EntryFunctionPayload'
      - $ref: '#/components/schemas/MultisigTransactionPayload_ScriptPayload'
      discriminator:
        propertyName: type
        mapping:
          entry_function_payload: '#/components/schemas/MultisigTransactionPayload_EntryFunctionPayload'
          script_payload: '#/components/schemas/MultisigTransactionPayload_ScriptPayload'
    WriteModule:
      type: object
      description: Write a new module or update an existing one
      required:
      - address
      - state_key_hash
      - data
      properties:
        address:
          $ref: '#/components/schemas/Address'
        state_key_hash:
          type: string
          description: State key hash
        data:
          $ref: '#/components/schemas/MoveModuleBytecode'
    WriteSetPayload:
      type: object
      description: A writeset payload, used only for genesis
      required:
      - write_set
      properties:
        write_set:
          $ref: '#/components/schemas/WriteSet'
    ScriptPayload:
      type: object
      description: Payload which runs a script that can run multiple functions
      required:
      - code
      - type_arguments
      - arguments
      properties:
        code:
          $ref: '#/components/schemas/MoveScriptBytecode'
        type_arguments:
          type: array
          description: Type arguments of the function
          items:
            $ref: '#/components/schemas/MoveType'
        arguments:
          type: array
          description: Arguments of the function
          items: {}
    IdentifierWrapper:
      type: string
    FederatedKeyless:
      type: object
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/HexEncodedBytes'
    Ed25519Signature:
      type: object
      description: A single Ed25519 signature
      required:
      - public_key
      - signature
      properties:
        public_key:
          $ref: '#/components/schemas/HexEncodedBytes'
        signature:
          $ref: '#/components/schemas/HexEncodedBytes'
    ReplayProtector_string(U64):
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - sequence_number
            example: sequence_number
      - $ref: '#/components/schemas/U64'
    ExportedAggregateSignature:
      type: object
      description: A more API-friendly representation of the on-chain `aptos_types::aggregate_signature::AggregateSignature`.
      required:
      - signer_indices
      properties:
        signer_indices:
          type: array
          items:
            type: integer
            format: uint64
        sig:
          $ref: '#/components/schemas/HexEncodedBytes'
    Signature_SlhDsa_Sha2_128s:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - slh_dsa__sha2_128s
            example: slh_dsa__sha2_128s
      - $ref: '#/components/schemas/SlhDsa_Sha2_128s'
    ChunkyDKGResultTransaction:
      type: object
      required:
      - version
      - hash
      - state_change_hash
      - event_root_hash
      - gas_used
      - success
      - vm_status
      - accumulator_root_hash
      - changes
      - events
      - timestamp
      - certified_subtrx
      - encryption_key
      properties:
        version:
          $ref: '#/components/schemas/U64'
        hash:
          $ref: '#/components/schemas/HashValue'
        state_change_hash:
          $ref: '#/components/schemas/HashValue'
        event_root_hash:
          $ref: '#/components/schemas/HashValue'
        state_checkpoint_hash:
          $ref: '#/components/schemas/HashValue'
        gas_used:
          $ref: '#/components/schemas/U64'
        success:
          type: boolean
          description: Whether the transaction was successful
        vm_status:
          type: string
          description: The VM status of the transaction, can tell useful information in a failure
        accumulator_root_hash:
          $ref: '#/components/schemas/HashValue'
        changes:
          type: array
          description: Final state of resources changed by the transaction
          items:
            $ref: '#/components/schemas/WriteSetChange'
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        timestamp:
          $ref: '#/components/schemas/U64'
        certified_subtrx:
          $ref: '#/components/schemas/ExportedCertifiedAggregatedChunkySubtranscript'
        encryption_key:
          $ref: '#/components/schemas/HexEncodedBytes'
    TransactionSummary:
      type: object
      required:
      - sender
      - version
      - transaction_hash
      - replay_protector
      properties:
        sender:
          $ref: '#/components/schemas/Address'
        version:
          $ref: '#/components/schemas/U64'
        transaction_hash:
          $ref: '#/components/schemas/HashValue'
        replay_protector:
          $ref: '#/components/schemas/ReplayProtector'
    MultisigPayload:
      type: object
      description: 'A multisig transaction that allows an owner of a multisig account to execute a pre-approved

        transaction as the multisig account.'
      required:
      - multisig_address
      properties:
        multisig_address:
          $ref: '#/components/schemas/Address'
        transaction_payload:
          $ref: '#/components/schemas/MultisigTransactionPayload'
    WriteSetChange_DeleteResource:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - delete_resource
            example: delete_resource
      - $ref: '#/components/schemas/DeleteResource'
    Keyless:
      type: object
      required:
      - value
      properties:
        value:
          $ref: '#/components/schemas/HexEncodedBytes'
    Signature_WebAuthn:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - web_authn
            example: web_authn
      - $ref: '#/components/schemas/WebAuthn'
    GenesisPayload_WriteSetPayload:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - write_set_payload
            example: write_set_payload
      - $ref: '#/components/schemas/WriteSetPayload'
