openapi: 3.0.0
info:
  title: Aptos Node Accounts Events API
  description: The Aptos Node API is a RESTful API for client applications to interact with the Aptos blockchain.
  version: 1.2.0
  contact:
    name: Aptos Labs
    url: https://github.com/aptos-labs/aptos-core
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: /v1
tags:
- name: Events
  description: Access to events
paths:
  /accounts/{address}/events/{creation_number}:
    get:
      tags:
      - Events
      summary: Get events by creation number
      description: 'Event types are globally identifiable by an account `address` and

        monotonically increasing `creation_number`, one per event type emitted

        to the given account. This API returns events corresponding to that

        that event type.'
      parameters:
      - name: address
        schema:
          $ref: '#/components/schemas/Address'
        in: path
        description: 'Hex-encoded 32 byte Aptos account, with or without a `0x` prefix, for

          which events are queried. This refers to the account that events were

          emitted to, not the account hosting the move module that emits that

          event type.'
        required: true
        deprecated: false
        explode: true
      - name: creation_number
        schema:
          $ref: '#/components/schemas/U64'
        in: path
        description: 'Creation number corresponding to the event stream originating

          from the given account.'
        required: true
        deprecated: false
        explode: true
      - name: start
        schema:
          $ref: '#/components/schemas/U64'
        in: query
        description: 'Starting sequence number of events.


          If unspecified, by default will retrieve the most recent events'
        required: false
        deprecated: false
        explode: true
      - name: limit
        schema:
          type: integer
          format: uint16
        in: query
        description: 'Max number of events to retrieve.


          If unspecified, defaults to default page size'
        required: false
        deprecated: false
        explode: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionedEvent'
            application/x-bcs:
              schema:
                type: array
                items:
                  type: integer
                  format: uint8
          headers:
            X-APTOS-CHAIN-ID:
              description: Chain ID of the current chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint8
            X-APTOS-LEDGER-VERSION:
              description: Current ledger version of the chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-LEDGER-OLDEST-VERSION:
              description: Oldest non-pruned ledger version of the chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-LEDGER-TIMESTAMPUSEC:
              description: Current timestamp of the chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-EPOCH:
              description: Current epoch of the chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-BLOCK-HEIGHT:
              description: Current block height of the chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-OLDEST-BLOCK-HEIGHT:
              description: Oldest non-pruned block height of the chain
              required: true
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-GAS-USED:
              description: The cost of the call in terms of gas
              deprecated: false
              schema:
                type: integer
                format: uint64
            X-APTOS-CURSOR:
              description: 'Cursor to be used for endpoints that support cursor-based

                pagination. Pass this to the `start` field of the endpoint

                on the next call to get the next page of results.'
              deprecated: false
              schema:
                type: string
            X-APTOS-TXN-ENCRYPTION-KEY:
              description: Per-epoch transaction encryption key (hex-encoded)
              deprecated: false
              schema:
                type: string
