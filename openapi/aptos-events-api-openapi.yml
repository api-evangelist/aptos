  /accounts/{address}/events/{event_handle}/{field_name}:
    get:
      tags:
      - Events
      summary: Get events by event handle
      description: 'This API uses the given account `address`, `eventHandle`, and `fieldName`

        to build a key that can globally identify an event types. It then uses this

        key to return events emitted to the given account matching that event type.'
      parameters:
      - name: address
        schema:
          $ref: '#/components/schemas/Address'
        in: path
        description: 'Hex-encoded 32 byte Aptos account, with or without a `0x` prefix, for

          which events are queried. This refers to the account that events were

          emitted to, not the account hosting the move module that emits that

          event type.'
        required: true
        deprecated: false
        explode: true
      - name: event_handle
        schema:
          $ref: '#/components/schemas/MoveStructTag'
        in: path
        description: Name of struct to lookup event handle e.g. `0x1::account::Account`
        required: true
        deprecated: false
        explode: true
      - name: field_name
        schema:
          $ref: '#/components/schemas/IdentifierWrapper'
        in: path
        description: Name of field to lookup event handle e.g. `withdraw_events`
        required: true
        deprecated: false
        explode: true
      - name: start
        schema:
          $ref: '#/components/schemas/U64'
        in: query
        description: 'Starting sequence number of events.


          If unspecified, by default will retrieve the most recent'
        required: false
