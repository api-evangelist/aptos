aid: aptos
name: Aptos
url: https://raw.githubusercontent.com/api-evangelist/aptos/refs/heads/main/apis.yml
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  Aptos is a Move-based Layer 1 blockchain platform that exposes a REST API for reading on-chain
  state and submitting transactions, a GraphQL Indexer API for high-level queries over processed
  blockchain data (NFTs, objects, custom Move contracts), and a gRPC Transaction Stream for
  real-time and historical event feeds. Public endpoints are provided by Aptos Labs for mainnet,
  testnet, and devnet; enhanced rate limits are available through Geomi (formerly Aptos Labs
  Developer Portal).
specificationVersion: '0.19'
created: '2026-06-13'
modified: '2026-06-13'
x-source: manual
x-category: Blockchain
x-type: company
x-tier: 2
x-tier-reason: manually-cataloged
