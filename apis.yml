apis:
  - aid: aptos:fullnode-rest-api
    name: Aptos Fullnode REST API
    description: >-
      Low-latency REST API for reading on-chain state and submitting transactions to the Aptos
      blockchain. Endpoints cover accounts (authentication key, sequence number, resources,
      modules, balances), blocks (by height or ledger version), events, transactions (read,
      submit, simulate), table items, Move view functions, and node health/info. Available on
      mainnet, testnet, and devnet.
    humanURL: https://aptos.dev/en/build/apis/fullnode-rest-api
    baseURL: https://api.mainnet.aptoslabs.com/v1
    tags:
      - Accounts
      - Transactions
      - Blocks
      - Events
      - Modules
      - Resources
      - Move
      - REST
    properties:
      - type: Documentation
        url: https://aptos.dev/en/build/apis/fullnode-rest-api
      - type: APIReference
        url: https://api.mainnet.aptoslabs.com/v1/spec
      - type: OpenAPI
        url: https://raw.githubusercontent.com/aptos-labs/aptos-core/main/api/doc/spec.yaml
      - type: Authentication
        url: https://geomi.dev/docs/api-keys
      - type: Sandbox
        url: https://api.testnet.aptoslabs.com/v1
  - aid: aptos:indexer-graphql-api
    name: Aptos Indexer GraphQL API
    description: >-
      High-level GraphQL API backed by the Aptos Indexer, providing opinionated access to
      processed blockchain data. Optimized for querying NFTs, Aptos Objects, token balances,
      fungible assets, custom Move contract events, and account activities. Available on mainnet
      and testnet with optional API key from Geomi for elevated rate limits.
    humanURL: https://aptos.dev/en/build/indexer/indexer-api
    baseURL: https://api.mainnet.aptoslabs.com/v1/graphql
    tags:
      - GraphQL
      - NFT
      - Objects
      - Tokens
      - Fungible Assets
      - Indexer
    properties:
      - type: Documentation
        url: https://aptos.dev/en/build/indexer/indexer-api
      - type: APIReference
        url: https://aptos.dev/en/build/indexer/indexer-api/indexer-reference
      - type: Authentication
        url: https://geomi.dev/docs/api-keys
      - type: Sandbox
        url: https://api.testnet.aptoslabs.com/v1/graphql
  - aid: aptos:transaction-stream-api
    name: Aptos Transaction Stream API
    description: >-
      gRPC streaming API that delivers historical and real-time transaction data from the Aptos
      blockchain. Used to power the Aptos Core Indexer and to build custom app-specific
      real-time event processors. Available on mainnet, testnet, and devnet via grpc endpoints.
    humanURL: https://aptos.dev/en/build/apis
    baseURL: https://grpc.mainnet.aptoslabs.com
    tags:
      - gRPC
      - Streaming
      - Transactions
      - Real-time
      - Indexer
    properties:
      - type: Documentation
        url: https://aptos.dev/en/build/apis
      - type: Authentication
        url: https://geomi.dev/docs/api-keys
  - aid: aptos:faucet-api
    name: Aptos Faucet API
    description: >-
      Testnet and devnet faucet that distributes APT test tokens for development and testing.
      Available programmatically on devnet; testnet faucet is accessible via the mint page.
      Not available on mainnet.
    humanURL: https://aptos.dev/en/network/nodes/networks
    baseURL: https://faucet.devnet.aptoslabs.com
    tags:
      - Faucet
      - Testnet
      - Devnet
      - Test Tokens
    properties:
      - type: Documentation
        url: https://aptos.dev/en/network/nodes/networks
